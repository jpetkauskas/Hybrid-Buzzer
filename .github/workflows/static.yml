name: Deploy buzzer demo to Pages

on:
  push:
    branches: [main]                       # adjust if your default branch differs
    paths: ["buzzer_receiver/main/index.html"]
  workflow_dispatch:                        # lets you trigger it manually too

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage demo files
        run: |
          mkdir -p _site
          cp buzzer_receiver/main/index.html _site/index.html
          # if the page pulls in sibling assets, copy them too:
          # cp buzzer_receiver/main/app.js _site/
          # cp buzzer_receiver/main/style.css _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
